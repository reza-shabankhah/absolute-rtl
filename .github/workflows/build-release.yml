name: Build Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Extension Archive
        run: |
          zip -r AbsoluteRTL-Extension.zip AbsoluteRTL/

      - name: Attach Assets to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} AbsoluteRTL-Extension.zip
